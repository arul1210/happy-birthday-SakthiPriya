<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Happy Birthday Sakthi 🎉</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght=0,400;0,700;0,900;1,400;1,700&family=DM+Sans:wght=300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold: #f5c842;
      --deep: rgba(14, 5, 27, 0.85);
      --rose: #ff6b9d;
      --teal: #00d4b4;
      --cream: #fff8ec;
    }

    html { scroll-behavior: smooth; }

    body {
      background: #06020a;
      color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
      display: none; /* Hidden until password verification */
    }

    /* ── SINGLE PANEL CLEAN BACKGROUND ── */
    .bg-photo-wrap {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      width: 100%;
      height: 100vh;
      opacity: 0.45; /* Slightly increased for a clearer, more vibrant look */
      filter: saturate(1.05) contrast(1.02);
    }
    
    .bg-panel-single {
      width: 100%;
      height: 100%;
      background-image: url('birthday_bg.jpeg'); 
      background-size: cover;
      background-position: center center;
      animation: gentleZoom 25s ease-in-out infinite alternate;
    }

    @keyframes gentleZoom {
      0% { transform: scale(1); }
      100% { transform: scale(1.05); }
    }

    .bg-overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      /* Balanced premium gradient overlay for high text contrast without blurring the photo */
      background: linear-gradient(to bottom, rgba(6,2,10,0.4) 0%, rgba(6,2,10,0.75) 50%, rgba(6,2,10,0.5) 100%);
      pointer-events: none;
    }

    /* ── LANTERNS AND EFFECTS ── */
    #stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }
    .lantern {
      position: absolute;
      width: 12px;
      height: 16px;
      background: rgba(245, 200, 66, 0.75);
      border-radius: 4px 4px 2px 2px;
      box-shadow: 0 0 12px #f5c842, 0 0 22px #ff6b9d;
      bottom: -20px;
      animation: floatUp var(--speed) linear infinite;
    }
    @keyframes floatUp {
      0% { transform: translateY(0) translateX(0) scale(0.8); opacity: 0; }
      15% { opacity: 0.8; }
      85% { opacity: 0.8; }
      100% { transform: translateY(-105vh) translateX(var(--drift)) scale(1.2); opacity: 0; }
    }

    /* ── CONFETTI CANVAS ── */
    #confetti-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 100;
    }

    /* ── HERO CONTENT ── */
    .hero {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }

    .cake-wrap {
      font-size: clamp(5rem, 15vw, 8.5rem);
      line-height: 1;
      animation: floatBob 3s ease-in-out infinite;
      filter: drop-shadow(0 0 35px var(--gold));
      margin-bottom: 1.5rem;
      cursor: pointer;
      transition: transform 0.15s;
    }
    .cake-wrap:active { transform: scale(0.92); }
    @keyframes floatBob {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-15px); }
    }

    .hero-label {
      font-size: clamp(0.7rem, 2vw, 0.85rem);
      font-weight: 500;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.75rem;
    }

    .hero-name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3.2rem, 13vw, 8.5rem);
      font-weight: 900;
      font-style: italic;
      line-height: 0.95;
      background: linear-gradient(135deg, #f5c842 0%, #ff9b6b 40%, #ff6b9d 75%, #a78bfa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1.25rem;
    }

    .hero-sub {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.1rem, 3.5vw, 1.8rem);
      margin-bottom: 2.5rem;
    }

    .scroll-hint {
      position: absolute;
      bottom: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      color: rgba(255,255,255,0.4);
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    .scroll-hint .arrow {
      width: 16px; height: 16px;
      border-right: 2px solid var(--gold);
      border-bottom: 2px solid var(--gold);
      transform: rotate(45deg);
      animation: bounce 1.5s ease-in-out infinite;
    }
    @keyframes bounce {
      0%,100% { transform: rotate(45deg) translateY(0); }
      50%      { transform: rotate(45deg) translateY(5px); }
    }

    /* ── WISHES SECTION ── */
    .wishes {
      position: relative;
      z-index: 2;
      max-width: 860px;
      margin: 0 auto;
      padding: 6rem 2rem;
      text-align: center;
    }
    .section-eyebrow {
      font-size: 0.78rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--teal);
      margin-bottom: 1rem;
    }
    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: 700;
      margin-bottom: 2.5rem;
    }
    .wish-card {
      background: linear-gradient(135deg, rgba(26, 10, 46, 0.5) 0%, rgba(14, 5, 27, 0.7) 100%);
      border: 1px solid rgba(245,200,66,0.25);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      margin-bottom: 2rem;
      backdrop-filter: blur(12px);
    }
    .wish-text {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.1rem, 2.5vw, 1.35rem);
      font-style: italic;
      line-height: 1.8;
      color: rgba(255,248,236,0.9);
    }

    /* ── BALLOONS ── */
    .balloons {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      flex-wrap: wrap;
      padding: 2rem;
    }
    .balloon {
      font-size: clamp(3rem, 8vw, 4.5rem);
      cursor: pointer;
      transition: transform 0.2s;
      animation: sway var(--sd, 3s) ease-in-out infinite alternate;
    }
    .balloon:hover { transform: scale(1.2) rotate(8deg); }
    @keyframes sway {
      from { transform: rotate(-6deg) translateY(0); }
      to   { transform: rotate(6deg) translateY(-10px); }
    }

    /* ── COUNTER ── */
    .counter-section {
